name: Feature request
description: Propose a reusable improvement for the open-source project
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Use this template for reusable product or developer-experience improvements. For security reports, use the private disclosure process in SECURITY.md.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      placeholder: What pain point or limitation are you seeing?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Describe the change you want to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: What other options did you consider?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      placeholder: Add screenshots, implementation notes, or examples if helpful.
