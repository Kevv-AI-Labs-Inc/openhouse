name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─── Gate 1: Static analysis ───
  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

  # ─── Gate 2: Unit & integration tests ───
  test-unit:
    name: Unit & Smoke Tests
    runs-on: ubuntu-latest
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Run critical tests
        run: npm run test:critical

  # ─── Gate 3: Build + bundle budget + E2E + a11y + perf ───
  build-and-e2e:
    name: Build & E2E
    needs: [lint, test-unit]
    runs-on: ubuntu-latest
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      AUTH_TRUST_HOST: true
      NEXTAUTH_URL: http://127.0.0.1:3210
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3210
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3210
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Check bundle size budget
        run: npm run test:bundle-size

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests
        run: npx playwright test e2e/public-signin.spec.ts e2e/landing-page.spec.ts e2e/dashboard-navigation.spec.ts e2e/kiosk-signin.spec.ts

      - name: Run accessibility tests
        run: npx playwright test e2e/accessibility.spec.ts

      - name: Run performance tests
        run: npx playwright test e2e/performance.spec.ts

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
